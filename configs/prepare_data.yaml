defaults:
  - _self_

hydra:
  job:
    chdir: false

dataset:
  path: csebuetnlp/xlsum
  name: ukrainian   # HF dataset config name — set to null to omit
  split: train

# Each entry truncates one column to max_tokens using the given HF tokenizer.
truncation:
  - column: text
    tokenizer: google/gemma-3-1b-it
    max_tokens: 2048

prompt:
  # Use {column_name} placeholders from any dataset column.
  # System-prompt-like instructions are inlined here because Gemma-3 has no system turn.
  template: |-
    Ти — стислий сумаризатор українських новин.
    Обсяг: 1–2 речення. Без вступних фраз.

    ЗАГОЛОВОК: {title}
    ТЕКСТ: {text}
  output_column: prompt

output:
  dir: data/processed
  format: parquet   # parquet | json | jsonl | csv
  filename: null    # null → auto: {split}.{format}
  num_proc: 4       # parallelism for prompt mapping (truncation always uses 1)
