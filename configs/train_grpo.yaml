defaults:
  - hydra: default
  - _self_


exp_name: gemma3-1b-grpo
seed: 3407


model:
  name: nuinashco/gemma-3-1b-it-xlsum-ua-sft
  max_seq_length: 3072
  load_in_4bit: false
  load_in_8bit: false
  full_finetuning: false  # fast_inference requires LoRA, not full FT
  fast_inference: true
  gpu_memory_utilization: 0.5
  lora:
    r: 32
    alpha: 32
    dropout: 0
    bias: none
    finetune_vision_layers: false
    finetune_language_layers: true
    finetune_attention_modules: true
    finetune_mlp_modules: true
    random_state: ${seed}

dataset:
  path: nuinashco/ukr-toxicity-processed
  split: train
  prompt_column: prompt
  chat_template: gemma-3
  num_proc: 4
  eval_split: validation
  eval_num_samples: 200

# SFT data used for ROUGE + toxicity eval callbacks during training
sft_dataset:
  path: nuinashco/xlsum-ua-processed
  split: validation
  prompt_column: prompt
  summary_column: summary
  num_samples: null

rewards:
  - type: toxicity
    weight: 1.0
    params:
      reward_model: textdetox/xlmr-large-toxicity-classifier-v2
  # - type: length
  #   weight: 0.5
  #   params:
  #     tokenizer: ${model.name}
  #     min_tokens: 12
  #     max_tokens: 100

eval_callbacks:
  dataset: ${sft_dataset}
  vllm:
    max_new_tokens: 128
    sleep_mode: ${training.vllm_enable_sleep_mode}
  callbacks:
    - type: rouge
    - type: toxicity

# Passed straight through to trl.GRPOConfig.
training:
  output_dir: outputs/${exp_name}/checkpoints
  logging_dir: outputs/${exp_name}/logs
  per_device_train_batch_size: 8
  learning_rate: 5e-6  # GRPO is sensitive; keep small
  num_train_epochs: 1
  max_steps: 1000  # set -1 for full epoch
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  optim: adamw_8bit
  bf16: true
  gradient_checkpointing: true
  logging_steps: 5
  save_strategy: steps
  save_steps: 100
  save_total_limit: 2
  seed: ${seed}
  report_to: wandb
  eval_strategy: steps
  eval_steps: 100
  per_device_eval_batch_size: 16  # must be a multiple of num_generations
  dataloader_drop_last: true

  # GRPO-specific
  max_prompt_length: 512
  max_completion_length: 128
  num_generations: 8    # rollouts per prompt
  temperature: 1.0      # higher diversity during rollout
  top_p: 1.0
  beta: 0.03            # KL penalty strength (0.01–0.05 typical)
  loss_type: dapo       # token-normalised variant — more stable than grpo_clip
  use_vllm: true
  vllm_mode: colocate
  vllm_gpu_memory_utilization: ${model.gpu_memory_utilization}
  vllm_enable_sleep_mode: false  # offloads weights to CPU between rollout batches

wandb:
  project: gemma3-xlsum-ua
  name: ${exp_name}
  entity: ivan-havlytskyiz
