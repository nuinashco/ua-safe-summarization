defaults:
  - _self_

hydra:
  job:
    chdir: false

model:
  name: unsloth/gemma-3-1b-it
  max_seq_length: 3072
  load_in_4bit: false
  load_in_8bit: false
  full_finetuning: true

dataset:
  path: nuinashco/xlsum-ua-processed
  split: train
  prompt_column: prompt
  summary_column: summary
  chat_template: gemma-3
  val_split: validation
  eval_num_samples: null  # null = entire split
  num_proc: 4

masking:
  train_on_responses_only: true
  instruction_part: "<start_of_turn>user\n"
  response_part: "<start_of_turn>model\n"

# Passed straight through to trl.SFTConfig.
training:
  output_dir: outputs/gemma3-1b-xlsum-ua
  dataset_text_field: prompt
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  group_by_length: true
  warmup_ratio: 0.03
  num_train_epochs: 1
  max_steps: -1  # -1 = disabled; set e.g. 20 for a quick pipeline smoke-test
  learning_rate: 2.0e-5
  optim: adamw_8bit
  max_grad_norm: 1.0
  lr_scheduler_type: cosine
  bf16: true
  gradient_checkpointing: true
  dataset_num_proc: 12
  logging_steps: 10
  save_strategy: steps
  save_steps: 500
  save_total_limit: 2
  eval_strategy: steps
  eval_steps: 500
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  seed: 3407
  report_to: wandb

# Per-step ROUGE evaluation during training (VLLMManagerCallback).
eval_callback:
  enabled: true
  split: ${dataset.val_split}
  num_samples: ${dataset.eval_num_samples}
  max_new_tokens: 128
  vllm:
    gpu_memory_utilization: 0.5  # vLLM GPU fraction; rest stays free for the optimizer

# Standalone final evaluation (scripts/validate/validate_sft.py).
final_eval:
  split: test
  num_samples: null      # null = entire split
  max_new_tokens: 256
  vllm:
    gpu_memory_utilization: 0.9

wandb:
  project: gemma3-xlsum-ua
  name: gemma3-1b-sft
  entity: ivan-havlytskyiz
  run_id: null  # set or auto-discovered from output_dir/wandb_run_id.txt by validate_sft.py
